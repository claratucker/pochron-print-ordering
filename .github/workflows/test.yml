name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit and integration tests
        run: npm test

      - name: End-to-end smoke tests
        run: |
          npm run seed
          npm run smoke

      # Stripe tests need a key, so they only run where one is configured.
      # Forks and outside contributors skip them rather than failing.
      - name: Stripe integration (test mode)
        if: ${{ secrets.STRIPE_TEST_SECRET_KEY != '' }}
        env:
          PAYMENT_DRIVER: stripe
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_TEST_SECRET_KEY }}
        run: npx vitest run tests/payments-stripe.test.js
