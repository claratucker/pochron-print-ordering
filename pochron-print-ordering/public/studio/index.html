<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>Pochron Studios — Proofing Queue</title>
<style>
  :root{
    --paper:#fff;--paper2:#FAF9FB;--paper3:#F4F1F7;--ink:#534270;--soft:#6B5D83;
    --line:#E7E3EC;--petrol:#6E5B8F;--ok:#3f6f4a;--ok-bg:#eef5ef;--warn:#9a6a2a;
    --warn-bg:#fbf3e6;--bad:#a24941;--bad-bg:#f7ecea;--self:#8a5a1f;--self-bg:#f6efe6;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper2);color:var(--ink);
    font:14px/1.5 "Proxima Nova","Mulish",system-ui,Segoe UI,Roboto,Arial,sans-serif}
  header{background:var(--paper);border-bottom:1px solid var(--line);padding:16px 24px;
    display:flex;align-items:center;gap:16px;justify-content:space-between;position:sticky;top:0;z-index:5}
  header .lhs{display:flex;align-items:baseline;gap:14px}
  h1{font-size:15px;letter-spacing:.16em;text-transform:uppercase;margin:0;color:var(--petrol)}
  .sub{font-size:12px;color:var(--soft);letter-spacing:.02em}
  main{max-width:1040px;margin:0 auto;padding:22px 20px 80px}
  button{font:inherit;cursor:pointer;border:1px solid var(--petrol);background:var(--petrol);
    color:#fff;border-radius:3px;padding:8px 15px;letter-spacing:.02em}
  button.ghost{background:transparent;color:var(--petrol)}
  button.subtle{background:var(--paper);color:var(--soft);border-color:var(--line)}
  button:disabled{opacity:.45;cursor:default}
  input,textarea{font:inherit;border:1px solid var(--line);background:var(--paper2);
    border-radius:2px;padding:8px 9px;color:var(--ink)}
  textarea{width:100%;resize:vertical;min-height:52px}
  a{color:var(--petrol)}

  /* gate */
  .gate{max-width:360px;margin:90px auto;text-align:center;background:var(--paper);
    border:1px solid var(--line);border-radius:5px;padding:34px 28px}
  .gate h2{font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:var(--soft);margin:0 0 6px}
  .gate p{font-size:12.5px;color:var(--soft);margin:0 0 18px}
  .gate input{width:100%;margin-bottom:12px;padding:11px}
  .gate button{width:100%;padding:11px}
  .gate .err{color:var(--bad);font-size:12.5px;margin-top:12px;min-height:16px}

  /* tabs + summary */
  .bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
  .pill{font-size:11.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--soft);
    background:var(--paper);border:1px solid var(--line);border-radius:20px;padding:5px 12px}
  .pill b{color:var(--petrol)}
  .seg{display:flex;border:1px solid var(--line);border-radius:4px;overflow:hidden;background:var(--paper)}
  .seg button{border:0;border-radius:0;background:var(--paper);color:var(--soft);padding:7px 14px;
    letter-spacing:.04em;font-size:12.5px}
  .seg button.on{background:var(--paper3);color:var(--petrol);font-weight:600}
  .grow{flex:1}

  /* order card */
  .order{background:var(--paper);border:1px solid var(--line);border-radius:5px;margin-bottom:18px;overflow:hidden}
  .order.flag{border-color:#e6cf9f}
  .ohead{display:flex;align-items:center;gap:14px;padding:14px 18px;border-bottom:1px solid var(--line);
    background:var(--paper3);flex-wrap:wrap}
  .ref{font-family:"SFMono-Regular",Menlo,Consolas,monospace;font-size:13px;font-weight:700;color:var(--ink);letter-spacing:.03em}
  .who{font-size:13.5px}.who .em{color:var(--soft);font-size:12px}
  .when{font-size:11.5px;color:var(--soft)}
  .tot{font-weight:700}
  .badge{font-size:10.5px;letter-spacing:.09em;text-transform:uppercase;border-radius:3px;padding:3px 8px;border:1px solid transparent}
  .b-submitted{background:var(--warn-bg);color:var(--warn);border-color:#e6cf9f}
  .b-on_hold{background:var(--bad-bg);color:var(--bad);border-color:#e3c3bf}
  .b-in_production,.b-approved{background:var(--ok-bg);color:var(--ok);border-color:#c3ddc7}
  .b-shipped,.b-complete{background:var(--paper2);color:var(--soft);border-color:var(--line)}
  .b-wl{background:#efeaf6;color:var(--petrol);border-color:#d9cfe8}

  /* items */
  .items{padding:6px 18px 2px}
  .it{display:grid;grid-template-columns:64px 1fr auto auto;gap:14px;align-items:center;
    padding:12px 0;border-bottom:1px solid var(--line)}
  .it:last-child{border-bottom:0}
  .thumb{width:64px;height:64px;border-radius:3px;object-fit:cover;background:var(--paper3);
    border:1px solid var(--line);display:block}
  .thumb.ph{display:flex;align-items:center;justify-content:center;color:var(--soft);font-size:10px;text-align:center}
  .iname{font-size:13.5px}
  .ispec{font-size:12px;color:var(--soft);font-family:"SFMono-Regular",Menlo,Consolas,monospace}
  .tags{margin-top:5px;display:flex;gap:6px;flex-wrap:wrap}
  .tag{font-size:10px;letter-spacing:.06em;text-transform:uppercase;border-radius:3px;padding:2px 7px;border:1px solid var(--line);color:var(--soft)}
  .tag.studio{background:#efeaf6;color:var(--petrol);border-color:#d9cfe8}
  .tag.self{background:var(--self-bg);color:var(--self);border-color:#e3d2b8}
  .tag.dpi-ok{background:var(--ok-bg);color:var(--ok);border-color:#c3ddc7}
  .tag.dpi-soft{background:var(--warn-bg);color:var(--warn);border-color:#e6cf9f}
  .tag.dpi-too_small{background:var(--bad-bg);color:var(--bad);border-color:#e3c3bf}
  .iline{font-weight:600;font-size:13px;text-align:right;white-space:nowrap}
  .isel{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--soft)}
  .isel input{width:16px;height:16px;accent-color:var(--petrol)}
  .recipe{font-size:11.5px;color:var(--soft);margin-top:4px;font-family:"SFMono-Regular",Menlo,Consolas,monospace}
  .orig{font-size:11.5px}

  /* thread + actions */
  .thread{padding:10px 18px;background:var(--paper2);border-top:1px solid var(--line)}
  .thread .m{font-size:12.5px;margin:3px 0}
  .thread .m .fromst{color:var(--petrol);font-weight:600}
  .thread .m .fromcu{color:var(--soft);font-weight:600}
  .actions{padding:14px 18px;display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap;border-top:1px solid var(--line)}
  .holdbox{flex:1;min-width:240px;display:flex;flex-direction:column;gap:8px}
  .holdrow{display:flex;gap:8px}
  .shiprow{display:flex;gap:8px;align-items:center}
  .note{font-size:11.5px;color:var(--soft);width:100%}
  .amt-hint{font-size:11.5px;color:var(--soft)}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;
    padding:11px 18px;border-radius:4px;font-size:13px;opacity:0;pointer-events:none;transition:opacity .2s;z-index:20}
  .toast.show{opacity:1}
  .empty{text-align:center;color:var(--soft);padding:60px 20px;font-size:13px}
  .loading{text-align:center;color:var(--soft);padding:60px 20px}
</style>
</head>
<body>

<div id="gate" class="gate">
  <h2>Proofing Queue</h2>
  <p>Pochron Studios — studio access</p>
  <input id="pw" type="password" placeholder="Studio password" autocomplete="current-password" />
  <button id="enter">Enter</button>
  <div id="gateErr" class="err"></div>
</div>

<div id="app" style="display:none">
  <header>
    <div class="lhs">
      <h1>Proofing Queue</h1>
      <span class="sub">Every print reviewed before it's made</span>
    </div>
    <div style="display:flex;gap:10px;align-items:center">
      <button class="subtle" id="refresh">Refresh</button>
      <button class="ghost" id="signout">Sign out</button>
    </div>
  </header>
  <main>
    <div class="bar">
      <span class="pill">Awaiting proof <b id="pendingN">0</b></span>
      <span class="pill">Total <b id="totalN">0</b></span>
      <div class="grow"></div>
      <div class="seg" id="filter">
        <button data-f="pending" class="on">Needs review</button>
        <button data-f="all">All</button>
      </div>
    </div>
    <div id="list"><div class="loading">Loading queue…</div></div>
  </main>
</div>

<div id="toast" class="toast"></div>

<script>
const API = ''; // same origin as this page (order.pochronstudios.com)
let PW = sessionStorage.getItem('ps_studio_pw') || '';
let FILTER = 'pending';
let DATA = { queue: [], pending: 0, total: 0 };

const $ = (s, r=document) => r.querySelector(s);
const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const money = (n) => '$' + Number(n).toFixed(2);

function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2600); }

async function api(path, opts={}){
  const res = await fetch(API + path, {
    ...opts,
    headers: { 'Content-Type':'application/json', 'X-Studio-Password': PW, ...(opts.headers||{}) },
  });
  let body = null; try { body = await res.json(); } catch {}
  if (res.status === 401) { signOut('Session expired — sign in again.'); throw new Error('401'); }
  if (!res.ok) throw new Error((body && (body.error||body.detail)) || ('HTTP '+res.status));
  return body;
}

/* ---------- auth gate ---------- */
$('#enter').onclick = tryEnter;
$('#pw').addEventListener('keydown', e => { if (e.key === 'Enter') tryEnter(); });
async function tryEnter(){
  PW = $('#pw').value.trim();
  if (!PW) return;
  try {
    const q = await api('/api/studio/queue');   // 401 throws → caught below
    sessionStorage.setItem('ps_studio_pw', PW);
    DATA = q; showApp();
  } catch(e){
    if (e.message === '401') $('#gateErr').textContent = 'Incorrect password.';
    else $('#gateErr').textContent = e.message;
  }
}
function showApp(){ $('#gate').style.display='none'; $('#app').style.display='block'; render(); }
function signOut(msg){
  sessionStorage.removeItem('ps_studio_pw'); PW='';
  $('#app').style.display='none'; $('#gate').style.display='block';
  $('#gateErr').textContent = msg || ''; $('#pw').value='';
}
$('#signout').onclick = () => signOut();
$('#refresh').onclick = load;
$('#filter').addEventListener('click', e => {
  const b = e.target.closest('button'); if(!b) return;
  FILTER = b.dataset.f;
  [...$('#filter').children].forEach(x => x.classList.toggle('on', x===b));
  render();
});

async function load(){
  try { DATA = await api('/api/studio/queue'); render(); }
  catch(e){ if(e.message!=='401') toast(e.message); }
}

/* ---------- render ---------- */
const NEEDS = new Set(['submitted','on_hold']);
function render(){
  $('#pendingN').textContent = DATA.pending;
  $('#totalN').textContent = DATA.total;
  const rows = DATA.queue.filter(o => FILTER==='all' ? true : NEEDS.has(o.status));
  const list = $('#list');
  if (!rows.length){ list.innerHTML = `<div class="empty">${FILTER==='pending'?'Nothing awaiting review. 🎞️':'No orders yet.'}</div>`; return; }
  list.innerHTML = rows.map(orderCard).join('');
  rows.forEach(wireOrder);
}

function statusLabel(s){ return s.replace(/_/g,' '); }
function dpiTagClass(f){ return 'dpi-' + (f||'ok'); }
function dpiLabel(f){ return f==='too_small' ? 'Low res' : f==='soft' ? 'DPI soft' : 'DPI ok'; }

function orderCard(o){
  const anyLow = o.items.some(i => i.dpiFlag==='too_small');
  const canAct = NEEDS.has(o.status);
  const items = o.items.map(i => itemRow(o,i,canAct)).join('');
  const thread = (o.messages && o.messages.length) ? `<div class="thread">${
    o.messages.map(m => `<div class="m"><span class="${m.direction==='studio_to_customer'?'fromst':'fromcu'}">${
      m.direction==='studio_to_customer'?'Studio':(m.direction==='system'?'System':'Customer')}:</span> ${esc(m.body)}</div>`).join('')
  }</div>` : '';

  return `
  <div class="order ${anyLow?'flag':''}" data-id="${o.id}">
    <div class="ohead">
      <span class="ref">${esc(o.ref)}</span>
      <span class="badge b-${o.status}">${esc(statusLabel(o.status))}</span>
      ${o.whiteLabel ? '<span class="badge b-wl">White-label</span>' : ''}
      <div class="who">${esc(o.who)} <span class="em">· ${esc(o.email)}</span></div>
      <div class="grow"></div>
      <span class="tot">${money(o.total)}</span>
      <span class="when">${new Date(o.createdAt.replace(' ','T')+'Z').toLocaleString()}</span>
    </div>
    <div class="items">${items}</div>
    ${thread}
    ${canAct ? actionsBlock(o) : (o.status==='in_production'||o.status==='approved' ? shipOnlyBlock(o) : '')}
  </div>`;
}

function itemRow(o,i,canAct){
  const path = i.colorPath==='studio' ? '<span class="tag studio">Studio color-correct</span>'
             : i.colorPath==='self'   ? '<span class="tag self">Customer self-edit</span>'
             : '<span class="tag">As submitted</span>';
  const dpi = `<span class="tag ${dpiTagClass(i.dpiFlag)}">${dpiLabel(i.dpiFlag)}${i.dpi?(' · '+i.dpi+' dpi'):''}</span>`;
  const recipe = (i.colorPath==='self' && i.adjust)
    ? `<div class="recipe">recipe: ${esc(Object.entries(i.adjust).filter(([,v])=>v).map(([k,v])=>k+' '+v).join('  ') || 'crop/framing only')}</div>` : '';
  const orig = i.originalUrl ? `<div class="orig"><a href="${esc(i.originalUrl)}" target="_blank" rel="noopener">open original</a> · prints from original</div>` : '';
  const thumb = i.originalUrl
    ? `<img class="thumb" src="${esc(i.originalUrl)}" alt="" onerror="this.classList.add('ph');this.replaceWith(Object.assign(document.createElement('div'),{className:'thumb ph',textContent:'no preview'}))">`
    : `<div class="thumb ph">no file</div>`;
  const sel = canAct ? `<label class="isel"><input type="checkbox" class="pick" data-item="${i.id}" checked> approve</label>` : '';
  return `
  <div class="it">
    ${thumb}
    <div>
      <div class="iname">${esc(i.name || 'photo')}</div>
      <div class="ispec">${esc(i.paper)} · ${esc(i.size)} · ×${i.qty}${i.px?(' · '+esc(i.px)+' px'):''}</div>
      <div class="tags">${path}${dpi}</div>
      ${recipe}${orig}
    </div>
    <div class="iline">${money(i.lineTotal)}</div>
    <div>${sel}</div>
  </div>`;
}

function actionsBlock(o){
  return `
  <div class="actions">
    <button class="approve">Approve &amp; print</button>
    <span class="amt-hint" data-hint></span>
    <div class="holdbox">
      <textarea class="holdmsg" placeholder="Message the customer (e.g. ask for a higher-res file), then place the order on hold…"></textarea>
      <div class="holdrow"><button class="ghost hold">Hold &amp; message</button></div>
    </div>
    <div class="note">Approving captures payment for the selected photos. Unchecked photos stay on hold for a partial capture.</div>
  </div>`;
}
function shipOnlyBlock(o){
  return `
  <div class="actions">
    <div class="shiprow">
      <input class="tracking" placeholder="Tracking number (optional)" style="width:220px" />
      <button class="ship">Mark shipped</button>
    </div>
    <div class="note">Notifies the customer that ${esc(o.ref)} is on its way.</div>
  </div>`;
}

/* ---------- wire actions ---------- */
function wireOrder(o){
  const el = $(`.order[data-id="${o.id}"]`); if(!el) return;
  const picks = () => [...el.querySelectorAll('.pick')];
  const selected = () => picks().filter(p=>p.checked).map(p=>+p.dataset.item);
  const hint = el.querySelector('[data-hint]');

  function refreshHint(){
    if(!hint) return;
    const ids = selected();
    const all = ids.length === o.items.length;
    const sum = o.items.filter(i=>ids.includes(i.id)).reduce((s,i)=>s+i.lineTotal,0);
    if(!ids.length){ hint.textContent='select at least one photo'; return; }
    hint.textContent = all ? `captures ${money(o.total)} (incl. shipping)` : `partial: captures ${money(sum)}`;
  }
  picks().forEach(p => p.addEventListener('change', refreshHint));
  refreshHint();

  const approveBtn = el.querySelector('.approve');
  if (approveBtn) approveBtn.onclick = async () => {
    const ids = selected();
    if(!ids.length) return toast('Select at least one photo to approve.');
    const all = ids.length === o.items.length;
    const amt = all ? o.total : o.items.filter(i=>ids.includes(i.id)).reduce((s,i)=>s+i.lineTotal,0);
    if(!confirm(`Approve ${all?'all photos':ids.length+' photo(s)'} in ${o.ref} and capture ${money(amt)}?`)) return;
    approveBtn.disabled = true;
    try {
      const r = await api(`/api/studio/orders/${o.id}/approve`, {
        method:'POST', body: JSON.stringify(all ? {} : { itemIds: ids }),
      });
      toast(`${o.ref}: captured ${money(r.captured)}${r.partial?' (partial)':''} → ${statusLabel(r.status)}`);
      load();
    } catch(e){ approveBtn.disabled=false; toast(e.message); }
  };

  const holdBtn = el.querySelector('.hold');
  if (holdBtn) holdBtn.onclick = async () => {
    const msg = el.querySelector('.holdmsg').value.trim();
    if(!msg) return toast('Write a short message for the customer.');
    holdBtn.disabled = true;
    try {
      await api(`/api/studio/orders/${o.id}/hold`, { method:'POST', body: JSON.stringify({ message: msg }) });
      toast(`${o.ref} placed on hold — customer emailed.`);
      load();
    } catch(e){ holdBtn.disabled=false; toast(e.message); }
  };

  const shipBtn = el.querySelector('.ship');
  if (shipBtn) shipBtn.onclick = async () => {
    const tracking = el.querySelector('.tracking').value.trim();
    shipBtn.disabled = true;
    try {
      await api(`/api/studio/orders/${o.id}/ship`, { method:'POST', body: JSON.stringify({ tracking }) });
      toast(`${o.ref} marked shipped.`);
      load();
    } catch(e){ shipBtn.disabled=false; toast(e.message); }
  };
}

/* ---------- boot ---------- */
if (PW) { load().then(()=>{ if(PW) showApp(); }).catch(()=>signOut()); }
</script>
</body>
</html>
